app = "bd-diamond-renewal"
primary_region = "ams"

[build]
  dockerfile = "Dockerfile"

[env]
  SERVE_STATIC = "1"
  SESSION_COOKIE_NAME = "bd_session"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[mounts]]
  source = "data"
  destination = "/data"

[[http_service.checks]]
  interval = "15s"
  timeout = "2s"
  grace_period = "10s"
  method = "GET"
  path = "/api/health"

[deploy]
  release_command = "npx prisma migrate deploy"

