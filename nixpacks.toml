# Nixpacks configuration for Railway
# This tells Railway how to build and run the app

[phases.setup]
nixPkgs = ["nodejs-20_x"]

[phases.install]
cmds = [
  "npm ci"
]

[phases.build]
cmds = [
  "npm run build",
  "npm run db:generate"
]

[start]
cmd = "npm run db:migrate && NODE_ENV=production SERVE_STATIC=1 npm start"

# Ensure Railway uses the root directory
[staticAssets]
publicDir = "dist"
